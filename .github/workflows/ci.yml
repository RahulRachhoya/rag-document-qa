name: CI

# CI for rag-document-qa
# - test job: always runs (lint + unit/integration tests, no secrets needed)
# - deploy-hf: on main push, only if HF_TOKEN secret is present. HF_TOKEN is used
#   SOLELY for pushing the Gradio demo to Hugging Face Spaces. It is provided and
#   maintained by the user/fork owner. HF_TOKEN is NEVER needed for Render API
#   deploys, local runs, or runtime of the FastAPI backend.
# - deploy-render: on main push, triggers the user's Render deploy hook (set as
#   RENDER_DEPLOY_HOOK GitHub secret). This causes Render to redeploy using
#   render.yaml + Dockerfile (which include the 512MB mitigations: reranker
#   disabled by default in free IaC, CPU-only torch, thread limits, --workers 1).
#
# See README (Free Deployment, HF Spaces Demo, OOM Troubleshooting), render.yaml
# (detailed IaC comments), and tests/live/test_full_live_pipeline.py (HF_TOKEN note).
#
# No HF_TOKEN or other secrets are required to run tests or for the core Render
# backend to function once deployed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/

      - name: Run full test system (unit + integration + UI serving)
        run: pytest tests/ -q --tb=line --maxfail=10

  deploy-hf:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # HF_TOKEN (if present) is used only here for the HF Gradio demo deploy.
    # This job is skipped gracefully if the secret is missing. The token is
    # only for CI Gradio/HF Spaces; it has no relation to the 512MB Render
    # free tier or RAG API runtime.

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            pip install huggingface_hub
            python - <<'EOF'
          from huggingface_hub import HfApi
          import os, pathlib

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "RahulRachhoya/rag-document-qa"

          # Ensure space exists
          try:
              api.create_repo(repo_id=repo_id, repo_type="space", space_sdk="gradio", exist_ok=True)
          except Exception as e:
              print(f"Repo creation skipped: {e}")

          # Upload hf_demo/ contents + src/ package
          hf_demo = pathlib.Path("hf_demo")
          for f in hf_demo.iterdir():
              api.upload_file(
                  path_or_fileobj=str(f),
                  path_in_repo=f.name,
                  repo_id=repo_id,
                  repo_type="space",
              )

          # Upload src package so hf_demo/app.py can import it
          src_dir = pathlib.Path("src")
          for f in src_dir.rglob("*.py"):
              api.upload_file(
                  path_or_fileobj=str(f),
                  path_in_repo=str(f),
                  repo_id=repo_id,
                  repo_type="space",
              )
          print("Deployed to HF Spaces.")
          EOF
          else
            echo "HF_TOKEN not set - skipping HF deploy"
          fi

  deploy-render:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # This triggers a redeploy on Render using the IaC in render.yaml.
    # The actual 512MB fixes (reranker=false in free IaC, CPU torch etc.) live
    # in render.yaml + Dockerfile (see those files and README OOM section).
    # RENDER_DEPLOY_HOOK secret is user-provided via Render dashboard + GH secrets.

    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "Triggering Render deploy..."
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "Render deploy hook called. Check Render dashboard for build logs."
          else
            echo "RENDER_DEPLOY_HOOK not set - skipping Render deploy"
            echo "Create a Deploy Hook in your Render service settings and add it as a GitHub secret."
          fi
