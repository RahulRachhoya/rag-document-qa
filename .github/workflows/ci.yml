name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Dependabot PRs use dependabot-ci.yml for a fuller verification suite.
    if: github.event_name == 'push' || github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/

      - name: Run unit tests
        run: pytest tests/unit -v --tb=short

      - name: Run integration tests
        if: github.event_name == 'pull_request'
        run: pytest tests/integration -v --tb=short

  deploy-hf:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            pip install huggingface_hub
            python - <<'EOF'
          from huggingface_hub import HfApi
          import os, pathlib

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "RahulRachhoya/rag-document-qa"

          # Ensure space exists
          try:
              api.create_repo(repo_id=repo_id, repo_type="space", space_sdk="gradio", exist_ok=True)
          except Exception as e:
              print(f"Repo creation skipped: {e}")

          # Upload hf_demo/ contents + src/ package
          hf_demo = pathlib.Path("hf_demo")
          for f in hf_demo.iterdir():
              api.upload_file(
                  path_or_fileobj=str(f),
                  path_in_repo=f.name,
                  repo_id=repo_id,
                  repo_type="space",
              )

          # Upload src package so hf_demo/app.py can import it
          src_dir = pathlib.Path("src")
          for f in src_dir.rglob("*.py"):
              api.upload_file(
                  path_or_fileobj=str(f),
                  path_in_repo=str(f),
                  repo_id=repo_id,
                  repo_type="space",
              )
          print("Deployed to HF Spaces.")
          EOF
          else
            echo "HF_TOKEN not set - skipping HF deploy"
          fi

  deploy-render:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "Triggering Render deploy..."
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "Render deploy hook called. Check Render dashboard for build logs."
          else
            echo "RENDER_DEPLOY_HOOK not set - skipping Render deploy"
            echo "Create a Deploy Hook in your Render service settings and add it as a GitHub secret."
          fi
