# Runs a full verification suite on Dependabot pull requests before merge.
name: Dependabot CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: dependabot-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Test (${{ matrix.python-version }})
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            hf_demo/requirements.txt

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/

      - name: Run unit tests
        run: pytest tests/unit -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration -v --tb=short

  hf-demo:
    name: HF demo requirements
    if: >-
      github.actor == 'dependabot[bot]' &&
      (contains(github.head_ref, 'hf_demo') ||
       contains(github.event.pull_request.title, 'hf_demo'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: hf_demo/requirements.txt

      - name: Install HF demo requirements
        run: pip install -r hf_demo/requirements.txt

      - name: Verify HF demo imports
        run: |
          python -c "import gradio; import groq; import qdrant_client; print('HF demo deps OK')"

  docker:
    name: Docker build
    if: >-
      github.actor == 'dependabot[bot]' &&
      (contains(github.head_ref, 'docker') ||
       contains(github.event.pull_request.title, 'docker'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t rag-document-qa:dependabot-test .

      - name: Smoke test container health endpoint
        run: |
          docker run -d --name rag-qa-smoke -p 8000:8000 rag-document-qa:dependabot-test
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Health check passed"
              docker logs rag-qa-smoke
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker logs rag-qa-smoke
          exit 1

  github-actions:
    name: Validate workflow syntax
    if: >-
      github.actor == 'dependabot[bot]' &&
      (contains(github.head_ref, 'github_actions') ||
       contains(github.event.pull_request.title, 'github-actions'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash
          sudo mv actionlint /usr/local/bin/

      - name: Lint GitHub Actions workflows
        run: actionlint