# Render Infrastructure as Code (IaC)
# Deploy via: connect repo in Render dashboard (auto-detects this file)
# or trigger via GitHub Actions deploy hook (see ci.yml).

services:
  - type: web
    name: rag-document-qa-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: RERANKER_ENABLED
        value: "false"
      - key: LOW_MEMORY
        value: "true"
      - key: EMBED_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: CHUNK_SIZE
        value: "256"
      - key: PORT
        value: "8000"
      # Set GROQ_API_KEY as a secret in the Render dashboard (required for queries)
      - key: GROQ_API_KEY
        sync: false
      # Optional: persistent vector storage via Qdrant Cloud
      # - key: QDRANT_URL
      #   sync: false
      # - key: QDRANT_API_KEY
      #   sync: false